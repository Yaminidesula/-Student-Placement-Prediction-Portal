{% extends "base.html" %}

{% block title %}Register - {{ app_name }}{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon">
                <i class="bi bi-person-plus"></i>
            </div>
            <h3>Create Account</h3>
            <p>Register to start predicting your placement</p>
        </div>
        
        <form method="POST" action="{{ url_for('register') }}" class="auth-form" enctype="multipart/form-data">
            <!-- Profile Photo -->
            <div class="mb-3">
                <label for="profile_photo" class="form-label">
                    <i class="bi bi-camera"></i> Profile Photo
                </label>
                <input type="file" 
                       class="form-control" 
                       id="profile_photo" 
                       name="profile_photo" 
                       accept="image/*"
                       onchange="previewImage(this)">
                <div class="photo-preview mt-2" id="photoPreview"></div>
            </div>

            <div class="mb-3">
                <label for="name" class="form-label">
                    <i class="bi bi-person"></i> Full Name
                </label>
                <input type="text" 
                       class="form-control" 
                       id="name" 
                       name="name" 
                       placeholder="Enter your full name"
                       required>
            </div>
            
            <div class="mb-3">
                <label for="email" class="form-label">
                    <i class="bi bi-envelope"></i> Email Address
                </label>
                <input type="email" 
                       class="form-control" 
                       id="email" 
                       name="email" 
                       placeholder="Enter your email"
                       required>
            </div>

            <!-- Branch and Roll Number -->
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="branch" class="form-label">
                        <i class="bi bi-building"></i> Branch
                    </label>
                    <select class="form-select" id="branch" name="branch" required>
                        <option value="" selected disabled>Select Branch</option>
                        <option value="CSE">Computer Science & Engineering</option>
                        <option value="ECE">Electronics & Communication</option>
                        <option value="EEE">Electrical & Electronics</option>
                        <option value="MECH">Mechanical Engineering</option>
                        <option value="CIVIL">Civil Engineering</option>
                        <option value="IT">Information Technology</option>
                        <option value="MBA">MBA</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="roll_number" class="form-label">
                        <i class="bi bi-card-text"></i> Roll Number
                    </label>
                    <input type="text" 
                           class="form-control" 
                           id="roll_number" 
                           name="roll_number" 
                           placeholder="e.g., 20B91A0001"
                           required>
                </div>
            </div>
            
            <div class="mb-3">
                <label for="password" class="form-label">
                    <i class="bi bi-lock"></i> Password
                </label>
                <div class="password-wrapper">
                    <input type="password" 
                           class="form-control" 
                           id="password" 
                           name="password" 
                           placeholder="Create a password (min 6 characters)"
                           minlength="6"
                           required>
                    <button type="button" class="password-toggle" onclick="togglePassword('password', 'toggleIcon1')">
                        <i class="bi bi-eye" id="toggleIcon1"></i>
                    </button>
                </div>
            </div>
            
            <div class="mb-3">
                <label for="confirm_password" class="form-label">
                    <i class="bi bi-lock-fill"></i> Confirm Password
                </label>
                <div class="password-wrapper">
                    <input type="password" 
                           class="form-control" 
                           id="confirm_password" 
                           name="confirm_password" 
                           placeholder="Confirm your password"
                           required>
                    <button type="button" class="password-toggle" onclick="togglePassword('confirm_password', 'toggleIcon2')">
                        <i class="bi bi-eye" id="toggleIcon2"></i>
                    </button>
                </div>
            </div>
            
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="terms" required>
                <label class="form-check-label" for="terms">
                    I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                </label>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 auth-btn">
                <i class="bi bi-person-check"></i> Register
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
        </div>
    </div>
</div>

<style>
.auth-container {
    min-height: calc(100vh - 200px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
}

.auth-card {
    background: white;
    border-radius: 20px;
    padding: 40px;
    width: 100%;
    max-width: 450px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
}

.auth-header {
    text-align: center;
    margin-bottom: 30px;
}

.auth-icon {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
}

.auth-icon i {
    font-size: 40px;
    color: white;
}

.auth-header h3 {
    color: #333;
    font-weight: 600;
    margin-bottom: 10px;
}

.auth-header p {
    color: #666;
    margin: 0;
}

.auth-form .form-label {
    font-weight: 500;
    color: #555;
}

.password-wrapper {
    position: relative;
}

.password-toggle {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: #666;
    cursor: pointer;
}

.auth-btn {
    padding: 12px;
    font-size: 16px;
    font-weight: 600;
    border-radius: 10px;
    background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
    border: none;
    transition: all 0.3s ease;
}

.auth-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(17, 153, 142, 0.3);
}

.auth-footer {
    text-align: center;
    margin-top: 25px;
    padding-top: 20px;
    border-top: 1px solid #eee;
}

.auth-footer a {
    color: #11998e;
    font-weight: 600;
    text-decoration: none;
}

.auth-footer a:hover {
    text-decoration: underline;
}

.form-check a {
    color: #11998e;
    text-decoration: none;
}

.photo-preview {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid #11998e;
    display: none;
}

.photo-preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.photo-preview.show {
    display: block;
}
</style>

<script>
function togglePassword(inputId, iconId) {
    const passwordInput = document.getElementById(inputId);
    const toggleIcon = document.getElementById(iconId);
    
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.classList.remove('bi-eye');
        toggleIcon.classList.add('bi-eye-slash');
    } else {
        passwordInput.type = 'password';
        toggleIcon.classList.remove('bi-eye-slash');
        toggleIcon.classList.add('bi-eye');
    }
}

// Password match validation
document.querySelector('form').addEventListener('submit', function(e) {
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirm_password').value;
    
    if (password !== confirmPassword) {
        e.preventDefault();
        alert('Passwords do not match!');
    }
});

// Image preview function
function previewImage(input) {
    const preview = document.getElementById('photoPreview');
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            preview.innerHTML = '<img src="' + e.target.result + '">';
            preview.classList.add('show');
        }
        reader.readAsDataURL(input.files[0]);
    }
}
</script>
{% endblock %}
